<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joseph LifeOS — 投資筆記</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #20243380;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #7c6af5;
    --green: #22c55e;
    --blue: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
  }

  .title { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 48px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 740px;
  }

  /* 市場卡片外框（非連結，只是容器） */
  .market-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 22px 16px;
  }

  .market-flag { font-size: 22px; margin-bottom: 10px; }

  .market-name {
    font-size: 20px; font-weight: 700; margin-bottom: 4px;
  }
  .market-name.tw { color: var(--green); }
  .market-name.us { color: var(--blue); }

  .market-desc {
    font-size: 12px; color: var(--muted); line-height: 1.6;
    margin-bottom: 18px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  /* 子連結列表 */
  .source-list { display: flex; flex-direction: column; gap: 8px; }

  .source-link {
    display: flex; align-items: center; justify-content: space-between;
    text-decoration: none; color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    transition: border-color .15s, background .15s;
  }
  .source-link:hover {
    border-color: var(--accent);
    background: rgba(124,106,245,.07);
  }

  .source-info { display: flex; flex-direction: column; gap: 2px; }
  .source-name { font-size: 14px; font-weight: 600; }
  .source-tags { display: flex; gap: 5px; margin-top: 3px; flex-wrap: wrap; }

  .tag {
    font-size: 10px; padding: 1px 7px; border-radius: 8px; font-weight: 500;
    background: rgba(124,106,245,.12); border: 1px solid rgba(124,106,245,.2);
    color: var(--accent);
  }
  .tag.tw {
    background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.2); color: var(--green);
  }
  .tag.us {
    background: rgba(59,130,246,.1); border-color: rgba(59,130,246,.2); color: var(--blue);
  }

  .source-arrow {
    font-size: 16px; color: var(--muted);
    transition: color .15s, transform .15s;
    flex-shrink: 0;
  }
  .source-link:hover .source-arrow { color: var(--accent); transform: translateX(2px); }

  footer { margin-top: 48px; color: var(--muted); font-size: 11px; }
</style>
</head>
<body>

<div class="title">Joseph LifeOS</div>
<div class="subtitle">投資分析筆記整合</div>

<div class="grid">

  <div class="market-card">
    <div class="market-flag">🇹🇼</div>
    <div class="market-name tw">台股</div>
    <div class="market-desc">籌碼追蹤 · 分點動向 · 主動 ETF 持股 · 題材熱度</div>
    <div class="source-list">
      <a class="source-link" href="云式籌碼/">
        <div class="source-info">
          <span class="source-name">籌碼追蹤</span>
          <div class="source-tags">
            <span class="tag tw">分點</span>
            <span class="tag tw">大戶散戶</span>
            <span class="tag tw">ETF 持股</span>
          </div>
        </div>
        <span class="source-arrow">›</span>
      </a>
    </div>
  </div>

  <div class="market-card">
    <div class="market-flag">🇺🇸</div>
    <div class="market-name us">美股</div>
    <div class="market-desc">即時策略 · 個股建議 · 進出場位置 · 大環境判斷</div>
    <div class="source-list">
      <a class="source-link" href="MimiVsJames/">
        <div class="source-info">
          <span class="source-name">即時策略</span>
          <div class="source-tags">
            <span class="tag us">個股</span>
            <span class="tag us">進出場</span>
          </div>
        </div>
        <span class="source-arrow">›</span>
      </a>
    </div>
  </div>

</div>

<footer>Joseph LifeOS · 僅供個人學習參考，不構成投資建議</footer>

</body>
</html>
