<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joseph LifeOS — 投資筆記</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #7c6af5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

  .title { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 40px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; width: 100%; max-width: 800px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; text-decoration: none; color: var(--text); transition: border-color .2s, transform .2s; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .card-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .card-meta { margin-top: 14px; font-size: 12px; color: var(--muted); }

  .tag { display: inline-block; background: rgba(124,106,245,.12); border: 1px solid rgba(124,106,245,.2); color: var(--accent); font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-right: 4px; }
  .tag.tw { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.2); color: #22c55e; }
  .tag.us { background: rgba(59,130,246,.1); border-color: rgba(59,130,246,.2); color: #3b82f6; }

  footer { margin-top: 40px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<div class="title">Joseph LifeOS</div>
<div class="subtitle">投資分析筆記整合</div>

<div class="grid">

  <a class="card" href="MimiVsJames/">
    <div class="card-label">美股分析</div>
    <div class="card-title">MimiVsJames</div>
    <div class="card-desc">Vocus 美股即時策略整理 — 個股建議、進場位置、大環境判斷</div>
    <div class="card-meta">
      <span class="tag us">美股</span>
      <span class="tag">6 月更新</span>
    </div>
  </a>

  <a class="card" href="云式籌碼/">
    <div class="card-label">台股籌碼</div>
    <div class="card-title">云式籌碼</div>
    <div class="card-desc">Pressplay 每日籌碼日報 — 分點動向、大戶散戶變化、題材追蹤</div>
    <div class="card-meta">
      <span class="tag tw">台股</span>
      <span class="tag">6 月更新</span>
    </div>
  </a>

</div>

<footer>Joseph LifeOS · 僅供個人學習參考，不構成投資建議</footer>

</body>
</html>
