<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健身紀錄｜Joseph LifeOS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0a0d14;
  --surface: #131720;
  --surface2: #1c2130;
  --border: #232839;
  --text: #e2e8f0;
  --muted: #64748b;
  --accent: #14b8a6;
  --green: #22c55e;
  --red: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', -apple-system, 'Helvetica Neue', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  padding: 0 20px 80px;
}
.mono { font-family: 'JetBrains Mono', monospace; }

.sticky-header {
  position: sticky; top: 0; z-index: 40;
  background: rgba(10,13,20,.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
  margin: 0 -20px 24px;
  padding-left: 20px; padding-right: 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.sticky-header h2 { font-size: 15px; font-weight: 600; }
.updated-chip { font-size: 11px; color: var(--muted); }
.back-link {
  font-size: 12px; color: var(--accent);
  text-decoration: none; opacity: .85;
}

.container { max-width: 720px; margin: 0 auto; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 14px;
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 10px; flex-wrap: wrap;
}
.ticker-row { display: flex; align-items: center; gap: 10px; }
.date { font-size: 13px; color: var(--muted); }
.badge {
  font-size: 11px; font-weight: 600;
  padding: 2px 9px; border-radius: 8px;
  background: rgba(20,184,166,.1); color: var(--accent);
  border: 1px solid rgba(20,184,166,.25);
}
.meta-row { display: flex; gap: 6px; }
.meta-chip {
  font-size: 11px; color: var(--muted);
  background: var(--surface2); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 6px;
}

.ex-row { padding: 8px 0; border-bottom: 1px solid var(--border); }
.ex-row:last-of-type { border-bottom: none; }
.ex-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.ex-name { font-size: 14px; font-weight: 600; }
.prog-chip { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 8px; }
.prog-chip.up   { color: var(--green); background: rgba(34,197,94,.1); }
.prog-chip.down { color: var(--red);   background: rgba(239,68,68,.1); }
.prog-chip.same { color: var(--muted); background: var(--surface2); }
.ex-sets { font-size: 13px; color: var(--text); }
.ex-notes { font-size: 12px; color: var(--muted); margin-top: 2px; }

.summary-text { font-size: 13px; color: var(--text); }
.workout-note {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}

.empty-state { color: var(--muted); font-size: 13px; text-align: center; margin-top: 60px; }

.footer {
  margin-top: 40px; padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--muted);
}

@media (max-width: 480px) {
  body { padding: 0 12px 60px; }
  .sticky-header { padding-left: 12px; padding-right: 12px; }
  .card { padding: 14px; }
}
</style>
</head>
<body>

<header class="sticky-header">
  <h2>健身紀錄</h2>
  <div style="display:flex;align-items:center;gap:14px;">
    <span class="updated-chip mono">更新 2026-07-16 10:33</span>
    <a href="../" class="back-link">← 回總覽</a>
  </div>
</header>

<div class="container">
<div class="empty-state">還沒有訓練紀錄，跟 Claude 說今天練了什麼就會記進來</div>
  <div class="footer">
    個人訓練紀錄 · 每筆動作跟上一次同動作比較進步/退步
  </div>
</div>

</body>
</html>
